<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Group Chat</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>AI Group Chat</h1>
      <div id="sessionArea" class="session-area">
        <input id="usernameInput" type="text" placeholder="Your name" maxlength="32" />
        <button id="saveNameBtn">Save</button>
      </div>
    </header>

    <main class="layout">
      <aside class="panel sidebar">
        <h2>Your Groups</h2>
        <form id="createGroupForm">
          <input id="groupNameInput" type="text" placeholder="New group name" required />
          <button type="submit">Create</button>
        </form>
        <form id="joinGroupForm">
          <input id="joinGroupIdInput" type="text" placeholder="Join by Group ID" required />
          <button type="submit">Join Group</button>
        </form>
        <ul id="groupList"></ul>
      </aside>

      <section class="panel chat">
        <div class="chat-header">
          <h2 id="activeGroupTitle">Select a group</h2>
          <p id="activeGroupSubtext">No group selected</p>
        </div>

        <div id="messageList" class="messages"></div>

        <form id="messageForm" class="message-form hidden">
          <input id="messageInput" type="text" maxlength="4000" placeholder="Type message..." required />
          <button type="submit">Send</button>
        </form>
      </section>

      <aside class="panel ai-config">
        <h2>Add AI Friend</h2>
        <form id="addAiForm">
          <input id="aiNameInput" type="text" placeholder="AI name" required />
          <textarea id="aiPersonaInput" placeholder="Persona (how this AI behaves)" required></textarea>
          <input id="aiModelInput" type="text" placeholder="Model (e.g. openai/gpt-4o-mini)" value="openai/gpt-4o-mini" />
          <label>
            Temperature
            <input id="aiTemperatureInput" type="number" min="0" max="2" step="0.1" value="1" />
          </label>
          <label>
            Reply delay (ms)
            <input id="aiDelayInput" type="number" min="0" max="15000" step="250" value="1500" />
          </label>
          <button id="addAiBtn" type="submit" disabled>Add AI to selected group</button>
        </form>

        <h3>AI Members</h3>
        <ul id="aiMemberList"></ul>
      </aside>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
