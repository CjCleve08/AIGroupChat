<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Group Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <section id="signInScreen" class="sign-in-screen">
      <div class="ambient ambient-left"></div>
      <div class="ambient ambient-right"></div>
      <div class="ambient ambient-center"></div>
      <div class="sign-in-card glass-card">
        <div class="sign-in-logo">✷</div>
        <h1>AI Group Chat</h1>
        <p>Sign in with Google to access your groups, messages, and AI companions.</p>
        <button id="googleSignInBtn" class="btn-primary" type="button">Continue with Google</button>
      </div>
    </section>

    <div id="appShell" class="app-shell hidden">
      <div class="ambient ambient-left"></div>
      <div class="ambient ambient-right"></div>
      <div class="ambient ambient-center"></div>

      <aside class="sidebar left-sidebar">
        <div class="left-topbar">
          <button id="profileBtn" class="icon-btn" type="button" aria-label="Profile settings">✷</button>
          <div class="left-topbar-actions">
            <button id="searchBtn" class="icon-btn" type="button" aria-label="Search groups">⌕</button>
            <button
              id="sidebarToggleBtn"
              class="icon-btn active"
              type="button"
              aria-label="Collapse sidebar"
              title="Collapse sidebar"
            >
              ◧
            </button>
          </div>
        </div>

        <form id="createGroupForm" class="inline-form">
          <button class="new-group-btn" type="submit">
            <span class="new-group-icon">✎</span>
            <span>New Group</span>
          </button>
        </form>

        <ul id="groupList" class="group-list nav-list"></ul>
      </aside>

      <section class="chat-area">
        <div class="chat-header glass-card">
          <div class="chat-header-main">
            <div class="chat-header-text">
              <h2 id="activeGroupTitle">Select a conversation</h2>
              <button id="activeGroupSubtext" class="subtext-link" type="button">
                Choose a group to start chatting
              </button>
            </div>
            <div class="chat-actions">
              <button id="addPersonBtn" class="btn-secondary" type="button" disabled>Add Person</button>
              <button id="addAiModalBtn" class="btn-secondary" type="button" disabled>Add AIs</button>
            </div>
          </div>
        </div>

        <div id="messageList" class="messages glass-card"></div>
        <div id="typingStatus" class="typing-status hidden"></div>

        <form id="messageForm" class="message-form glass-card hidden">
          <input id="messageInput" type="text" maxlength="4000" placeholder="Type message..." required />
          <button class="btn-primary icon-send" type="submit">Send</button>
        </form>
      </section>

    </div>

    <div id="profileModal" class="modal hidden">
      <div class="modal-backdrop" data-close-modal="true"></div>
      <div class="modal-card">
        <h3>Profile Settings</h3>
        <form id="profileForm" class="profile-form">
          <label>
            Display Name
            <input id="profileNameInput" type="text" maxlength="32" placeholder="Your name" required />
          </label>
          <label>
            Avatar URL (optional)
            <input id="profileAvatarInput" type="url" placeholder="https://..." />
          </label>
          <div class="modal-actions">
            <button id="signOutBtn" class="btn-secondary hidden" type="button">Sign Out</button>
            <button id="cancelProfileBtn" class="btn-secondary" type="button">Cancel</button>
            <button class="btn-primary" type="submit">Save Profile</button>
          </div>
        </form>
      </div>
    </div>

    <div id="dialogModal" class="modal hidden">
      <div class="modal-backdrop" data-close-dialog="true"></div>
      <div class="modal-card">
        <h3 id="dialogTitle">Dialog</h3>
        <p id="dialogMessage" class="dialog-message"></p>
        <input id="dialogInput" class="hidden" type="text" />
        <div class="modal-actions">
          <button id="dialogCancelBtn" class="btn-secondary" type="button">Cancel</button>
          <button id="dialogConfirmBtn" class="btn-primary" type="button">OK</button>
        </div>
      </div>
    </div>

    <div id="aiModal" class="modal hidden">
      <div class="modal-backdrop" data-close-ai-modal="true"></div>
      <div class="modal-card">
        <h3>Add AI Companion</h3>
        <form id="addAiForm" class="ai-form">
          <input id="aiNameInput" type="text" placeholder="AI name" required />
          <label>
            Short description (optional, for AI-generated personality)
            <input id="aiDescriptionInput" type="text" placeholder="e.g. a chill gamer who roasts friends" />
          </label>
          <div class="modal-actions generate-personality-actions">
            <button id="generatePersonalityBtn" class="btn-secondary" type="button">Generate personality with AI</button>
          </div>
          <textarea id="aiPersonaInput" placeholder="Persona (general description, or use character card below)"></textarea>
          <label>
            Personality
            <input id="aiPersonalityInput" type="text" placeholder="e.g. sarcastic, funny, rarely serious" />
          </label>
          <label>
            Texting style
            <input id="aiTextingStyleInput" type="text" placeholder="e.g. lowercase, short messages, uses lol and bro" />
          </label>
          <label>
            Group role
            <input id="aiGroupRoleInput" type="text" placeholder="e.g. the instigator who makes jokes" />
          </label>
          <label>
            Rules (one per line or semicolon-separated)
            <textarea id="aiRulesInput" placeholder="e.g. rarely more than 1 sentence; sometimes ignores messages"></textarea>
          </label>
          <label>
            Relationships (optional, how you act with specific people)
            <input id="aiRelationshipsInput" type="text" placeholder="e.g. roasts Tyler, agrees with Emma, competes with Ryan" />
          </label>
          <input
            id="aiModelInput"
            type="text"
            placeholder="Model (e.g. openai/gpt-4o-mini)"
            value="openai/gpt-4o-mini"
          />
          <label>
            Temperature
            <input id="aiTemperatureInput" type="number" min="0" max="2" step="0.1" value="1" />
          </label>
          <div class="modal-actions">
            <button id="cancelAiModalBtn" class="btn-secondary" type="button">Close</button>
            <button id="addAiBtn" class="btn-primary" type="submit" disabled>Add AI</button>
          </div>
        </form>
      </div>
    </div>

    <div id="membersModal" class="modal hidden">
      <div class="modal-backdrop" data-close-members-modal="true"></div>
      <div class="modal-card">
        <h3>Group Members</h3>
        <ul id="memberList" class="members-list"></ul>
        <div class="modal-actions">
          <button id="closeMembersModalBtn" class="btn-secondary" type="button">Close</button>
        </div>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
